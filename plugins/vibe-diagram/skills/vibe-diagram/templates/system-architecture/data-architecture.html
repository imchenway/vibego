<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>系统架构模板：数据架构视图</title>
  <style>
:root{--ink:#102033;--muted:#5a6c80;--paper:#fbfdff;--panel:rgba(255,255,255,.9);--line:#8db3d8;--blue:#1f6fb2;--blue-soft:#e8f3ff;--green:#17785a;--green-soft:#e9f8f2;--amber:#986506;--amber-soft:#fff6de;--red:#a63a3a;--red-soft:#fff0f0;--violet:#6254ad;--violet-soft:#f1efff;--shadow:0 16px 42px rgba(20,57,92,.085);--radius:20px}*{box-sizing:border-box}body{margin:0;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",Arial,sans-serif;background:radial-gradient(circle at 18% 3%,rgba(214,233,255,.78),transparent 30rem),radial-gradient(circle at 78% 6%,rgba(228,246,239,.8),transparent 28rem),linear-gradient(rgba(93,133,173,.045) 1px,transparent 1px),linear-gradient(90deg,rgba(93,133,173,.045) 1px,transparent 1px),linear-gradient(180deg,#fff 0%,#f7fbff 54%,#fbfdff 100%);background-size:auto,auto,28px 28px,28px 28px,auto;overflow-x:clip}main{width:min(1360px,calc(100vw - 32px));margin:0 auto;padding:20px 0}h1{font-size:clamp(24px,2.8vw,32px);line-height:1.18;letter-spacing:-.025em;margin:0 0 10px}.summary{margin:0 0 14px;color:var(--muted);line-height:1.65}.canvas,.template-layout{border:1px solid rgba(141,179,216,.48);border-radius:24px;background:rgba(255,255,255,.78);box-shadow:var(--shadow);padding:18px}.slot{display:grid;place-items:center;text-align:center;min-height:64px;border:1px solid rgba(141,179,216,.58);border-radius:16px;background:rgba(255,255,255,.95);padding:10px 12px;overflow-wrap:anywhere}.slot b{display:block;font-size:13px}.slot span{display:block;margin-top:4px;color:var(--muted);font-size:12px;line-height:1.45}.core{border-color:rgba(31,111,178,.56);background:linear-gradient(180deg,#fff,var(--blue-soft))}.support{border-color:rgba(98,84,173,.45);background:linear-gradient(180deg,#fff,var(--violet-soft))}.data{border-color:rgba(23,120,90,.45);background:linear-gradient(180deg,#fff,var(--green-soft))}.risk{border-color:rgba(166,58,58,.42);background:linear-gradient(180deg,#fff,var(--red-soft))}.ops{border-color:rgba(152,101,6,.42);background:linear-gradient(180deg,#fff,var(--amber-soft))}.arrow{position:relative;min-height:2px;background:var(--blue);align-self:center}.arrow:after{content:"";position:absolute;right:-1px;top:-5px;border-left:10px solid var(--blue);border-top:6px solid transparent;border-bottom:6px solid transparent}.v-arrow{width:2px;min-height:38px;background:var(--blue);justify-self:center;position:relative}.v-arrow:after{content:"";position:absolute;left:-5px;bottom:-1px;border-top:10px solid var(--blue);border-left:6px solid transparent;border-right:6px solid transparent}@media(max-width:780px){main{width:min(100vw - 20px,760px)}.template-layout{display:grid!important;grid-template-columns:1fr!important}.arrow{height:28px;width:2px;margin:auto}.arrow:after{right:-5px;top:22px;border-left:6px solid transparent;border-right:6px solid transparent;border-top:10px solid var(--blue);border-bottom:0}}


.router-pipeline{display:grid;grid-template-columns:1fr 28px 1.2fr 28px 1.2fr 28px 1fr;gap:12px;align-items:center}.router-group{display:grid;gap:10px}.boundary-hub{display:grid;grid-template-columns:1fr 1.25fr 1fr;grid-template-rows:auto auto;gap:16px}.boundary-box{grid-row:1/3;border:2px dashed rgba(31,111,178,.46);border-radius:28px;padding:18px;display:grid;gap:12px}.entry-core-foundation{display:grid;grid-template-columns:170px 1fr 210px;grid-template-rows:auto auto auto;gap:14px}.entry-core-foundation .foundation{grid-column:1/4}.whitebox-cluster{display:grid;grid-template-columns:170px 1fr 170px;gap:16px}.component-box{border:2px solid rgba(31,111,178,.42);border-radius:22px;padding:16px;display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.environment-zones{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}.env-zone{border:1.5px solid rgba(141,179,216,.58);border-radius:22px;padding:14px;display:grid;gap:12px}.north-south-layers{display:grid;gap:12px}.north-south-layers .layer{display:grid;grid-template-columns:180px 1fr 1fr;gap:12px}.data-domain-map{display:grid;grid-template-columns:180px 1fr 180px;grid-template-rows:auto auto;gap:14px}.domain-center{grid-row:1/3;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;border:1.5px solid rgba(23,120,90,.4);border-radius:22px;padding:14px}.dfd-trust-boundary{display:grid;grid-template-columns:180px 1fr 180px;gap:16px}.trust-box{border:2px dashed rgba(166,58,58,.42);border-radius:24px;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:12px}.contract-mesh{display:grid;grid-template-columns:1fr 220px 1fr;gap:16px}.contract-center{display:grid;gap:12px;border:1.6px solid rgba(31,111,178,.44);border-radius:22px;padding:14px}.event-bus{display:grid;grid-template-rows:auto 68px auto;gap:14px}.bus-line{display:grid;place-items:center;border-radius:18px;background:linear-gradient(90deg,var(--blue-soft),var(--violet-soft));border:1.5px solid rgba(98,84,173,.38);font-weight:900}.event-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.network-zones{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.security-threat-controls{display:grid;grid-template-columns:1fr 1.2fr 1fr;gap:16px}.security-center{border:2px dashed rgba(166,58,58,.42);border-radius:24px;padding:16px;display:grid;gap:12px}.identity-access-path{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:center}.failure-domain-recovery{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}.failure-domain{border:1.5px dashed rgba(166,58,58,.34);border-radius:22px;padding:14px;display:grid;gap:12px}.telemetry-pipeline{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}.delivery-rail{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.rail-stage{min-height:128px}.stack{display:grid;gap:12px}.wide{grid-column:1/-1}
</style>
</head>
<body>
<main data-diagram-type="system-architecture"
      data-diagram-grammar="system-architecture-presentation"
      data-template-family="system-architecture"
      data-template-id="data-architecture"
      data-template-layout="data-domain-map"
      data-system-arch-view="data-architecture"
      data-routing-confidence="{{routing_confidence}}">
  <h1 data-slot="title">{{title}}</h1>
  <p class="summary" data-slot="summary">{{summary}}</p>
  <section class="template-layout data-domain-map" aria-label="系统架构模板画布">
    <div class="stack">    <div class="slot " data-slot="data-producers"><b>数据生产方</b><span>{{data-producers}}</span></div>    <div class="slot " data-slot="ingestion-path"><b>采集/同步</b><span>{{ingestion-path}}</span></div></div>
    <div class="domain-center">    <div class="slot data" data-slot="domain-a"><b>数据域 A</b><span>{{domain-a}}</span></div>    <div class="slot data" data-slot="domain-b"><b>数据域 B</b><span>{{domain-b}}</span></div>    <div class="slot ops" data-slot="governance"><b>治理/质量</b><span>{{governance}}</span></div>    <div class="slot support" data-slot="lineage"><b>血缘/口径</b><span>{{lineage}}</span></div></div>
    <div class="stack">    <div class="slot " data-slot="data-consumers"><b>数据消费方</b><span>{{data-consumers}}</span></div>    <div class="slot " data-slot="serving-path"><b>服务出口</b><span>{{serving-path}}</span></div></div>
  </section>
  <section data-slot="evidence-and-notes">{{evidence_and_notes}}</section>
</main>
</body>
</html>
